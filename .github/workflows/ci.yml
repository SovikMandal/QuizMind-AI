name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck + build (backend + frontend)
        run: npm run build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quizuser
          POSTGRES_PASSWORD: quizpass
          POSTGRES_DB: quizapp
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U quizuser" --health-interval 5s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://quizuser:quizpass@127.0.0.1:5434/quizapp_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend
      - name: Run backend tests
        run: npm test --workspace backend
        
