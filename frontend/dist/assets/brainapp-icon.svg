<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="44" fill="#3D86F4"/>

  <!--
    Brain: two mirrored hemispheres, solid white.
    Center line at x=100. Each hemisphere is a closed filled path.
    Folds = blue ellipses punched out on top.
  -->

  <!-- LEFT HEMISPHERE solid shape -->
  <path d="
    M 100 72
    C 97 68  91 65  85 66
    C 78 67  73 72  72 78
    C 68 77  63 78  60 82
    C 57 87  58 93  62 96
    C 59 100 58 105 60 109
    C 62 114 67 117 72 117
    C 73 122 77 127 83 129
    C 88 131 93 129 96 126
    C 97 130 98 133 100 135
    L 100 72 Z
  " fill="white"/>

  <!-- RIGHT HEMISPHERE solid shape (mirror of left) -->
  <path d="
    M 100 72
    C 103 68  109 65  115 66
    C 122 67  127 72  128 78
    C 132 77  137 78  140 82
    C 143 87  142 93  138 96
    C 141 100 142 105 140 109
    C 138 114 133 117 128 117
    C 127 122 123 127 117 129
    C 112 131 107 129 104 126
    C 103 130 102 133 100 135
    L 100 72 Z
  " fill="white"/>

  <!-- Center divider line (blue) -->
  <rect x="98.5" y="72" width="3" height="63" fill="#3D86F4" rx="1.5"/>

  <!-- LEFT SIDE FOLD CUTOUTS (blue ellipses) -->
  <!-- Top-left fold -->
  <ellipse cx="83" cy="80" rx="7" ry="5.5" fill="#3D86F4"/>
  <!-- Mid-left fold -->
  <ellipse cx="65" cy="98" rx="5" ry="7" fill="#3D86F4"/>
  <!-- Lower-left fold -->
  <ellipse cx="76" cy="116" rx="7" ry="5" fill="#3D86F4"/>

  <!-- RIGHT SIDE FOLD CUTOUTS (blue ellipses, mirrored) -->
  <!-- Top-right fold -->
  <ellipse cx="117" cy="80" rx="7" ry="5.5" fill="#3D86F4"/>
  <!-- Mid-right fold -->
  <ellipse cx="135" cy="98" rx="5" ry="7" fill="#3D86F4"/>
  <!-- Lower-right fold -->
  <ellipse cx="124" cy="116" rx="7" ry="5" fill="#3D86F4"/>

</svg>
